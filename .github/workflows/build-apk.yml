name: Build Android APK

on:
  push:
    branches: [main]
    # Don't rebuild the app for website/proxy/docs-only changes — the APK
    # never bundles anything from server/ (that's the Vercel deployment).
    paths-ignore:
      - 'landing_page_**'
      - 'server/**'
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
      # Set once in GitHub: repo Settings → Secrets and variables → Actions →
      # Variables → EXPO_PUBLIC_AI_PROXY_URL = https://<project>.vercel.app
      # Baked into the JS bundle at build time. Empty = offline fallbacks.
      EXPO_PUBLIC_AI_PROXY_URL: ${{ vars.EXPO_PUBLIC_AI_PROXY_URL }}
      # RevenueCat Android public SDK key (starts with "goog_"). Add it as a
      # GitHub Variable named EXPO_PUBLIC_REVENUECAT_ANDROID_KEY — then every
      # build ships with in-app Premium purchasing enabled. Empty = locked.
      EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: ${{ vars.EXPO_PUBLIC_REVENUECAT_ANDROID_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      # arm64-v8a only: covers essentially every Android phone since ~2016 and
      # cuts the APK to roughly a third of the universal (4-ABI) size.
      - name: Build release APK (debug-signed, installable)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      # Versioned filename so downloads can never be confused with old builds.
      - name: Rename APK with build number
        run: cp android/app/build/outputs/apk/release/app-release.apk exhale-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: exhale-apk-v${{ github.run_number }}
          path: exhale-v${{ github.run_number }}.apk
          retention-days: 30
