name: Build Android APK

on:
  push:
    branches: [main]
    # Don't rebuild the app for website/proxy/docs-only changes — the APK
    # never bundles anything from server/ (that's the Vercel deployment).
    paths-ignore:
      - 'landing_page_**'
      - 'server/**'
      - '**.md'
  workflow_dispatch:

# A newer push supersedes an in-flight build — cancel the old one instead of
# letting two long Android builds run at once and pile up runner minutes.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
      # Set once in GitHub: repo Settings → Secrets and variables → Actions →
      # Variables → EXPO_PUBLIC_AI_PROXY_URL = https://<project>.vercel.app
      # Baked into the JS bundle at build time. Empty = offline fallbacks.
      EXPO_PUBLIC_AI_PROXY_URL: ${{ vars.EXPO_PUBLIC_AI_PROXY_URL }}
      # RevenueCat Android public SDK key (starts with "goog_"). Add it as a
      # GitHub Variable named EXPO_PUBLIC_REVENUECAT_ANDROID_KEY — then every
      # build ships with in-app Premium purchasing enabled. Empty = locked.
      EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: ${{ vars.EXPO_PUBLIC_REVENUECAT_ANDROID_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      # The RN template ships org.gradle.jvmargs=-Xmx2048m/MaxMetaspace=512m,
      # which OOMs the Gradle daemon on the full native-module tree (metaspace
      # exhaustion → the daemon thrashes and the build crawls for an hour+).
      # gradle.properties takes the LAST value for a duplicated key, so this
      # append overrides the template. GitHub's Linux runners have 16 GB RAM.
      - name: Raise Gradle memory
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"
          } >> android/gradle.properties

      # arm64-v8a only: covers essentially every Android phone since ~2016 and
      # cuts the APK to roughly a third of the universal (4-ABI) size.
      # -x lintVitalRelease: this is a test APK (debug-signed, installed by
      # hand). Release lint over every native module is the slowest task here
      # and the one that OOMs; the store build (EAS, eas.json) still runs full
      # checks, so skipping it in CI costs nothing and saves ~20 min.
      - name: Build release APK (debug-signed, installable)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a -x lintVitalRelease

      # Versioned filename so downloads can never be confused with old builds.
      - name: Rename APK with build number
        run: cp android/app/build/outputs/apk/release/app-release.apk exhale-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: exhale-apk-v${{ github.run_number }}
          path: exhale-v${{ github.run_number }}.apk
          retention-days: 30
